<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusPanel Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <i class="fas fa-cube"></i>
                <span id="websiteName">NexusPanel</span>
            </div>
            <div class="theme-selector">
                <button class="theme-option" data-theme="dark">🌙 Dark</button>
                <button class="theme-option" data-theme="light">☀️ Light</button>
                <button class="theme-option" data-theme="neon">⚡ Neon</button>
            </div>
        </header>

        <nav class="main-nav">
            <button class="nav-btn active" data-page="home"><i class="fas fa-home"></i> Utama</button>
            <button class="nav-btn" data-page="panel"><i class="fas fa-tachometer-alt"></i> Mode Panel</button>
            <button class="nav-btn" data-page="shop"><i class="fas fa-store"></i> Shop Menu</button>
            <button class="nav-btn" data-page="status"><i class="fas fa-chart-line"></i> Status Panel</button>
            <button class="nav-btn" data-page="dev"><i class="fas fa-code"></i> Dev Status</button>
        </nav>

        <main id="main-content"></main>

        <div class="music-player" id="musicPlayer">
            <div class="player-controls">
                <button id="playPauseBtn"><i class="fas fa-play"></i></button>
                <div class="song-info">
                    <span id="currentSong">No song playing</span>
                </div>
                <button id="nextSongBtn"><i class="fas fa-forward"></i></button>
            </div>
            <audio id="audioPlayer" preload="auto"></audio>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="payment.js"></script>
    <script src="api.js"></script>
    <script src="main.js"></script>
</body>
</html>
